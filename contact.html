<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Confirm Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles/dark.css">

  <style>
    .form-box {
      width: 95%;
      max-width: 600px;
      margin: 40px auto;
      background: #1a1a1a;
      padding: 35px;
      border-radius: 16px;
      border: 1px solid #333;
      animation: fadeIn 0.6s ease;
      box-sizing: border-box;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 6px;
      font-size: 1.1rem;
      color: #f2f2f2;
    }

    input, textarea {
      width: 100%;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #0d0d0d;
      color: #fff;
      font-size: 1.1rem;
      transition: 0.25s;
      box-sizing: border-box;
    }

    input:focus, textarea:focus {
      border-color: #fff;
      outline: none;
      background: #111;
    }

    textarea {
      height: 140px;
      resize: none;
    }

    button {
      margin-top: 25px;
      padding: 18px;
      width: 100%;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: 0.25s;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="logo">
    <img src="images/logo.png" alt="Logo">
  </div>
</header>

<section class="section" style="margin-top:100px; max-width:600px;">
  <h2>Confirm Your Booking</h2>
  <p>Please fill in your details below to complete your booking request.</p>

  <form action="https://usebasin.com/f/2f58921fea0f" method="POST" class="form-box">

    <!-- Spam protection -->
    <input type="text" name="website" style="display:none">

    <label>Selected Session</label>
    <input type="text" id="session" name="Session" readonly>

    <label>Your Name</label>
    <input type="text" name="Name" required>

    <label>Email</label>
    <input type="email" name="Email" required>

    <label>Phone Number</label>
    <input type="tel" name="Phone" required>

    <label>Notes (optional)</label>
    <textarea name="Notes" placeholder="Anything you'd like me to know?"></textarea>

    <button type="submit">Send Booking Request</button>
  </form>
</section>

<script>
  // Read session from URL
  const params = new URLSearchParams(window.location.search);
  const session = params.get("session");

  if (session) {
    document.getElementById("session").value = decodeURIComponent(session);
  }
</script>

</body>
</html>
