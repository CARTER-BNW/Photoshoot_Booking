<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You – Booking Received</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles/dark.css">

  <style>
    body {
      text-align: center;
      padding: 120px 20px;
    }

    .thank-box {
      max-width: 600px;
      margin: auto;
      background: #111;
      padding: 40px;
      border-radius: 12px;
      border: 1px solid #333;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      animation: fadeIn 0.8s ease-out;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      opacity: 0.85;
      margin-bottom: 20px;
    }

    .small {
      font-size: 0.9rem;
      opacity: 0.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    // Auto redirect after 5 seconds
    setTimeout(() => {
      window.location.href = "index.html#sessions";
    }, 5000);
  </script>
</head>

<body>

  <div class="thank-box">
    <h1>Thank You!</h1>
    <p>Your booking request has been received.</p>
    <p>I’ll get back to you shortly to confirm your session and send meeting details.</p>
    <p class="small">You’ll be redirected back to the homepage in a moment…</p>
  </div>

</body>
</html>
